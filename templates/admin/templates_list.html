{% extends "admin/base.html" %}
{% block content %}
<div class="flex between">
  <h2>Шаблоны</h2>
  <a class="button" href="/admin/templates/new">Добавить шаблон</a>
</div>

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Название</th>
      <th>Стиль</th>
      <th>Премиум</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody>
    {% for t in templates %}
    <tr>
      <td>{{ t.id }}</td>
      <td>{{ t.name }}</td>
      <td>{{ t.style.value }}</td>
      <td>{{ 'Да' if t.is_premium else 'Нет' }}</td>
      <td>
        <a href="/admin/templates/{{ t.id }}/edit">Редактировать</a>
        <form action="/admin/templates/{{ t.id }}/delete" method="post" style="display:inline" onsubmit="return confirm('Удалить шаблон?')">
          <button type="submit" class="link danger">Удалить</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
{% endblock %}
